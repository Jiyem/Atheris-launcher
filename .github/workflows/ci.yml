name: Build Release Assets
on:
  release:
    types: [published] # Se déclenche AUTOMATIQUEMENT dès que tu publies une Release sur GitHub

permissions:
  contents: write
  packages: write

jobs:
  upload-assets:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, ubuntu-latest, macos-14]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install Dependencies
        run: npm ci
        shell: bash

      # On compile l'application. Electron-builder va détecter qu'un événement 
      # de type "Release" est en cours sur GitHub et va injecter les fichiers directement dedans.
      - name: Build and Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTODISCOVER: false
        run: node build.js --obf=true --build=platform --${{ matrix.os == 'windows-2022' && 'win' || matrix.os == 'ubuntu-latest' && 'linux' || 'mac' }} -- --publish always
        shell: bash

      # SÉCURITÉ : On garde quand même les artefacts au cas où
      - name: Sauvegarder les exécutables (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Atheris-Launcher-Dossier-${{ matrix.os }}
          path: dist/
          if-no-files-found: warn