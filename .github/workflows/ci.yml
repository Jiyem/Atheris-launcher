name: Auto Release App
on:
  push:
    branches:
      - master # Se déclenche à chaque push sur master

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, ubuntu-latest, macos-14]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install Dependencies
        run: npm ci
        shell: bash

      # Cette étape extrait proprement la version du package.json pour la donner à GitHub
      - name: Get Version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "APP_VERSION=v$VERSION" >> $GITHUB_ENV
        shell: bash

      # Compilation et publication automatique.
      # electron-builder va créer la release nommée selon la version du package.json
      # si elle n'existe pas encore.
      - name: Build and Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTODISCOVER: false
        run: node build.js --obf=true --build=platform --${{ matrix.os == 'windows-2022' && 'win' || matrix.os == 'ubuntu-latest' && 'linux' || 'mac' }}
        shell: bash