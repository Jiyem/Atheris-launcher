name: Launcher Build
on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14, ubuntu-latest, windows-2022]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install Dependencies
        run: npm ci
        shell: bash

      # Cette étape compile l'application ET tente de la publier directement dans les Releases GitHub
      - name: Build and Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # electron-builder utilise souvent GITHUB_TOKEN ou GH_TOKEN
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build -- --publish always
        shell: bash

      # SÉCURITÉ : Si la publication automatique échoue, on sauvegarde quand même les fichiers
      # Vous pourrez télécharger le .exe directement depuis l'onglet Actions de GitHub
      - name: Sauvegarder les exécutables (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Atheris-Launcher-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.deb
            dist/*.AppImage
          if-no-files-found: ignore