name: Launcher Build
on:
  push:
    branches: [ master ]

permissions:
  contents: write
  packages: write

jobs:
  build-launcher:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest, windows-2022]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install Dependencies
        run: npm ci
        shell: bash

      # --- BLOC WINDOWS ---
      - name: Build Launcher (Windows)
        if: matrix.os == 'windows-2022'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTODISCOVER: false
        #run: npm run build -- --win
        run: node build.js --obf=false --build=platform --win
        shell: bash

      # Diagnostiquer le contenu exact du dossier dist sous Windows si ça échoue
      - name: Liste des fichiers générés (Windows)
        if: matrix.os == 'windows-2022'
        run: Get-ChildItem -Path . -Recurse -Depth 2 | Select-Object FullName
        shell: powershell

      # --- BLOC LINUX ---
      - name: Build Launcher (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build -- --linux
        shell: bash

      # --- BLOC MAC ---
      - name: Build Launcher (Mac)
        if: matrix.os == 'macos-14'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTODISCOVER: false
        run: npm run build -- --mac
        shell: bash

        
      # --- SAUVEGARDE DES ARTEFACTS ---
      # Au lieu de chercher des extensions précises, on prend TOUT le contenu du dossier dist
      # s'il a été créé par electron-builder.
      - name: Sauvegarder le dossier de sortie (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Atheris-Launcher-Dossier-${{ matrix.os }}
          path: |
            dist/
            app/
          if-no-files-found: warn