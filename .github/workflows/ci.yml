name: Launcher Build
on:
  push:
    branches: [ master ]

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # On associe chaque OS GitHub à la cible exacte attendue par votre script build.js
        include:
          - os: windows-2022
            platform_target: win
          - os: ubuntu-latest
            platform_target: linux
          - os: macos-14
            platform_target: mac

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install Dependencies
        run: npm ci
        shell: bash

      # Ici, on remplace "platform" dynamiquement par win, linux ou mac selon la machine
      # On retire le '-- --publish' qui faisait potentiellement planter votre build.js
      - name: Build Launcher
        env:
          CSC_IDENTITY_AUTODISCOVER: false
        run: node build.js --obf=true --build=${{ matrix.platform_target }}
        shell: bash

      # Étape essentielle : On récupère le fichier .exe (ou autre) généré localement
      - name: Sauvegarder les exécutables (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Atheris-Launcher-${{ matrix.platform_target }}
          path: |
            dist/
            build/
            out/
            release/
          if-no-files-found: ignore